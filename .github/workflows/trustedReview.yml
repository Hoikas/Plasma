# This workflow is the second leg of the automated script file review. It is executing in a
# *privledged* context that has WRITE ACCESS to the upstream repository. It is NOT SAFE to run
# untrusted (read: contributed) code here. For more information, see:
# https://securitylab.github.com/research/github-actions-preventing-pwn-requests/
# Note that this workflow runs from the master branch, so any changes to this file
# in a pull request will not take effect until it has either been merged.

name: Post PR Review
on:
  workflow_run:
    workflows: ["Untrusted PR Review"]
    types:
      - completed

jobs:
  comment:
    runs-on: ubuntu-latest
    if: >
      ${{ github.event.workflow_run.event == 'pull_request' &&
          github.event.workflow_run.conclusion == 'success' }}

    steps:
      # This is needed because actions/download-artifact won't know which workflow to look at.
      - name: Download Artifact
        uses: actions/github-script@v3.1.0
        with:
          script: |
            var artifacts = await github.actions.listWorkflowRunArtifacts({
               owner: context.repo.owner,
               repo: context.repo.repo,
               run_id: ${{github.event.workflow_run.id }},
            });
            var matchArtifact = artifacts.data.artifacts.filter((artifact) => {
              return artifact.name == "pr"
            })[0];
            var download = await github.actions.downloadArtifact({
               owner: context.repo.owner,
               repo: context.repo.repo,
               artifact_id: matchArtifact.id,
               archive_format: 'zip',
            });
            var fs = require('fs');
            fs.writeFileSync('${{github.workspace}}/pr.zip', Buffer.from(download.data));
      - name: Unzip Artifact
        run: unzip pr.zip

      - name: Post Review
        uses: actions/github-script@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { promises: fs } = require('fs')
            const event = (await fs.readFile('pr_event', 'utf8')).trim()
            const body = (await fs.readFile('pr_body.html', 'utf8')).trim()
            const issue_number = Number(await fs.readFile('pr_NR'));
            var req = {
              owner: context.repo.owner,
              pull_number: issue_number,
              repo: context.repo.repo,
              event: event
            };
            if (body !== "") {
              req.body = body;
            }
            await github.pulls.createReview(req);
